baseurl = "/"
title = "Francílio Araújo"
copyright = "Copyright &copy; 2025 - Francílio Araújo"

theme = "hugo-kiera"

paginate = 5
summaryLength = 50
enableEmoji = true
pygmentsCodeFences = true
DefaultContentLanguage = "pt"

[author]
    name = "Francílio"
    github = "francilioaraujo"
    twitter = "francilioaraujo"
    linkedin = "francilio-araújo-498b1a102"
    #behance = ""
    #email = "mailto://francilioaraujo@gmail.com"

[params]
    # change it to false if you don't need syntax highlighting, and save a little bandwidth
    isHighlightCode = true
    # set true need to use custom js
    useCustomSyntaxHighlight = false
    customJs = []
    customCss = ["./css/toc.css"]

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags"
  weight = 1

[[menu.main]]
  identifier = "categories"
  name = "Categorias"
  url = "/categories"
  weight = 1

[markup]
  [markup.highlight]
    style = "catppuccin-latte"
  [markup.tableOfContents]
    endLevel = 4